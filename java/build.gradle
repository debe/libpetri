plugins {
    id 'java-library'
    id 'jacoco'
}

group = 'org.libpetri'

java {
    sourceCompatibility = 25
    targetCompatibility = 25
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

repositories {
    mavenCentral()
}

dependencies {
    // Guava for collections (ArrayListMultimap)
    implementation 'com.google.guava:guava:33.4.8-jre'

    // Jackson XML for PNML export
    implementation 'com.fasterxml.jackson.dataformat:jackson-dataformat-xml:2.18.2'

    // Jackson for debug protocol types and event serialization
    implementation 'com.fasterxml.jackson.core:jackson-annotations:2.18.2'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.18.2'
    implementation 'com.fasterxml.jackson.datatype:jackson-datatype-jsr310:2.18.2'

    // Sirio - formal Petri net analysis (for export to Sirio format)
    implementation 'org.oris-tool:sirio:2.0.5'

    // Z3 SMT solver via JavaSMT (provides com.microsoft.z3 classes including Fixedpoint/Spacer)
    implementation 'org.sosy-lab:javasmt-solver-z3:4.14.0'

    // Testing
    testImplementation platform('org.junit:junit-bom:5.11.3')
    testImplementation 'org.junit.jupiter:junit-jupiter-api'
    testImplementation 'org.junit.jupiter:junit-jupiter-params'
    testRuntimeOnly 'org.junit.jupiter:junit-jupiter-engine'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // JMH for benchmarks
    testImplementation 'org.openjdk.jmh:jmh-core:1.37'
    testAnnotationProcessor 'org.openjdk.jmh:jmh-generator-annprocess:1.37'
}

test {
    useJUnitPlatform()
    finalizedBy jacocoTestReport
}

jacocoTestReport {
    dependsOn test
    reports {
        html.required = true
        xml.required = true
        csv.required = false
    }
}

// JMH benchmark task
tasks.register('jmh', JavaExec) {
    dependsOn testClasses
    mainClass = 'org.libpetri.benchmark.NetExecutorBenchmark'
    classpath = sourceSets.test.runtimeClasspath
    jvmArgs = ['--enable-preview']
}

// Copy CSS/JS resources to javadoc resource-files directory
tasks.register('copyJavadocResources', Copy) {
    from 'src/main/resources/javadoc'
    into "${buildDir}/docs/javadoc/resource-files"
    include '*.css', '*.js'
}

// Configure javadoc to use the custom PetriNet taglets
javadoc {
    options {
        // Force English output via JVM system properties (locale option alone is unreliable)
        jFlags('-Duser.language=en', '-Duser.country=US')

        // Register custom taglets for Petri net diagram generation
        taglets 'org.libpetri.doclet.MermaidTaglet'
        taglets 'org.libpetri.doclet.PetriNetTaglet'

        // Add classpath for taglet resolution (taglet classes need to be compiled first)
        tagletPath = files(sourceSets.main.output.classesDirs)

        // Standard javadoc options
        encoding = 'UTF-8'
        charSet = 'UTF-8'

        // Disable strict HTML validation (allow h3 without h2, etc.)
        addStringOption('Xdoclint:none', '-quiet')

        // Allow scripts in comments (required for Mermaid.js rendering)
        addBooleanOption('-allow-script-in-comments', true)

        // Load header from external file (keeps build.gradle clean)
        addStringOption('header', file('src/main/resources/javadoc/header.html').text.trim())
    }

    dependsOn classes
    finalizedBy copyJavadocResources
}

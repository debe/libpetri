version: 2
updates:
  - package-ecosystem: npm
    directory: /typescript
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    target-branch: main
    groups:
      non-major:
        update-types:
          - minor
          - patch

  - package-ecosystem: cargo
    directory: /rust
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    target-branch: main
    groups:
      non-major:
        update-types:
          - minor
          - patch

  - package-ecosystem: maven
    directory: /java
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    target-branch: main
    groups:
      non-major:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    target-branch: main
    groups:
      non-major:
        update-types:
          - minor
          - patch

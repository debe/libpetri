name: JMH Benchmarks

on:
  schedule:
    - cron: '0 0 * * 0'   # Weekly, Sunday midnight UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25-ea'
          distribution: 'temurin'

      - name: Run tests
        working-directory: java
        run: ./mvnw verify

      - name: Run JMH benchmarks
        working-directory: java
        run: ./mvnw test-compile exec:exec -Pjmh

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: jmh-results
          path: java/benchmark-results.json
          retention-days: 90

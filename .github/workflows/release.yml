name: Release to Maven Central

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25-ea'
          distribution: 'temurin'
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Set version from tag
        if: github.event_name == 'push'
        working-directory: java
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          ./mvnw versions:set -DnewVersion="$VERSION" -DgenerateBackupPoms=false

      - name: Set version from input
        if: github.event_name == 'workflow_dispatch'
        working-directory: java
        run: |
          ./mvnw versions:set -DnewVersion="${{ github.event.inputs.version }}" -DgenerateBackupPoms=false

      - name: Build and verify
        working-directory: java
        run: ./mvnw verify -Prelease

      - name: Deploy to Maven Central
        working-directory: java
        run: ./mvnw deploy -Prelease -DskipTests
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_TOKEN: ${{ secrets.CENTRAL_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
